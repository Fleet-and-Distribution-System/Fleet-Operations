version: "3.8"
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet_dev_password
      POSTGRES_DB: fleet_saas
    ports:
      - "5432:5432"
    volumes:
      - fleet_pg_data:/var/lib/postgresql/data

volumes:
  fleet_pg_data:
